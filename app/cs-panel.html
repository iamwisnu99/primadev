<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support - Primadev Digital Technology</title>

    <link rel="icon" type="image/png" href="/public/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <link rel="shortcut icon" href="/public/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Primadev" />
    <link rel="manifest" href="/public/site.webmanifest" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* =================== RESET =================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-bg: #ffffff;
            --sidebar-hover: #f1f5f9;
            --sidebar-active: #1d4ed8;
            --sidebar-border: #e5e7eb;
            --chat-bg: #f8fafc;
            --panel-bg: #ffffff;
            --primary: #1865ca;
            --primary-dark: #1456a8;
            --primary-light: #e8f0fe;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --success: #16a34a;
            --success-light: #dcfce7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --msg-agent-bg: #1865ca;
            --msg-user-bg: #ffffff;
            --radius: 12px;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--sidebar-bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* =================== LOGIN OVERLAY =================== */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background-color: #f0f9ff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #loginOverlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(at 10% 10%, rgba(200, 220, 255, 0.8) 0, transparent 50%),
                radial-gradient(at 90% 90%, rgba(255, 220, 240, 0.8) 0, transparent 50%),
                radial-gradient(at 50% 50%, rgba(255, 255, 255, 0.8) 0, transparent 50%);
            filter: blur(60px);
            z-index: -1;
            animation: moveBg 15s infinite alternate;
            pointer-events: none;
        }

        @keyframes moveBg {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .login-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 1;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .login-logo img {
            height: 45px;
            filter: brightness(0.2);
        }

        .login-title {
            color: #1e293b;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
        }

        .login-sub {
            color: #64748b;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 32px;
        }

        .login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(203, 213, 225, 0.5);
            border-radius: 12px;
            color: #334155;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 15px 18px;
            outline: none;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .login-input:focus {
            background: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .login-input::placeholder {
            color: #94a3b8;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .login-btn:hover {
            background: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        /* =================== MAIN LAYOUT =================== */
        #mainInterface {
            display: none;
            height: 100vh;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 100vh;
        }

        #mainInterface.visible {
            display: grid;
        }

        /* =================== LEFT SIDEBAR =================== */
        .left-sidebar {
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--sidebar-border);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            background: var(--primary);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: #fff;
            flex-shrink: 0;
        }

        .brand-text {
            line-height: 1.2;
        }

        .brand-name {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .brand-sub {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .logout-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
        }

        .sidebar-section-label {
            padding: 14px 18px 6px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b5563;
            flex-shrink: 0;
        }

        #chatList {
            flex: 1;
            overflow-y: auto;
        }

        #chatList::-webkit-scrollbar {
            width: 3px;
        }

        #chatList::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        .chat-item {
            padding: 12px 18px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .chat-item:hover {
            background: var(--sidebar-hover);
        }

        .chat-item.active {
            background: rgba(24, 101, 202, 0.15);
            border-left-color: var(--primary);
        }

        .chat-item-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .chat-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--chat-bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .chat-item.active .chat-avatar {
            background: linear-gradient(135deg, #1865ca, #1456a8);
            color: #fff;
            border-color: transparent;
        }

        .chat-meta {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-preview {
            font-size: 0.72rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .chat-time {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .empty-queue {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px 20px;
            color: #374151;
            text-align: center;
        }

        .empty-queue i {
            font-size: 2rem;
            color: #374151;
        }

        .empty-queue p {
            font-size: 0.78rem;
            color: #4b5563;
        }

        /* =================== MAIN CHAT AREA =================== */
        .main-chat {
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            overflow: hidden;
        }

        /* Chat header */
        .chat-top-bar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-top-bar.hidden {
            visibility: hidden;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .chat-user-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chat-user-status {
            font-size: 0.72rem;
            color: var(--text-secondary);
        }

        .resolve-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            background: var(--success-light);
            color: var(--success);
            border: 1.5px solid #86efac;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .resolve-btn:hover {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        /* Messages */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 2px;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-chat-icon {
            width: 64px;
            height: 64px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #cbd5e1;
        }

        .empty-chat h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: #94a3b8;
        }

        .empty-chat p {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        /* Date separator */
        .date-sep {
            text-align: center;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            position: relative;
            margin: 8px 0;
        }

        .date-sep::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
            z-index: 0;
        }

        .date-sep span {
            position: relative;
            background: var(--chat-bg);
            padding: 0 12px;
        }

        /* Bubbles */
        .msg {
            max-width: 68%;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .msg-user {
            align-self: flex-start;
        }

        .msg-agent {
            align-self: flex-end;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-user .msg-bubble {
            background: #fff;
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .msg-agent .msg-bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(24, 101, 202, 0.25);
        }

        .msg-footer {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .msg-agent .msg-footer {
            justify-content: flex-end;
        }

        .tick-read {
            color: #1865ca;
        }

        .tick-pending {
            color: var(--text-muted);
        }

        /* System messages */
        .msg-system {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 100px;
            align-self: center;
        }

        /* Input area */
        .chat-input-bar {
            background: #fff;
            border-top: 1px solid var(--border);
            padding: 14px 20px;
            flex-shrink: 0;
        }

        .chat-input-bar.hidden {
            visibility: hidden;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--chat-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 101, 202, 0.08);
        }

        #agentInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: var(--text-primary);
            resize: none;
            max-height: 100px;
            line-height: 1.5;
            padding: 4px 0;
        }

        #agentInput::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* =================== RIGHT PANEL =================== */
        .right-panel {
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .panel-header h4 {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .panel-body::-webkit-scrollbar {
            width: 4px;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 2px;
        }

        /* Customer Info */
        .customer-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1865ca, #1456a8);
            color: #fff;
            font-size: 1.4rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 4px 16px rgba(24, 101, 202, 0.25);
        }

        #profileInitial {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .profile-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .profile-email {
            font-size: 0.75rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        /* Info rows */
        .info-section {
            margin-bottom: 20px;
        }

        .info-section-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            background: var(--chat-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 6px;
        }

        .info-row i {
            color: var(--primary);
            font-size: 0.75rem;
            width: 14px;
        }

        .info-row-val {
            font-size: 0.82rem;
            color: var(--text-primary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .info-row-val.muted {
            color: var(--text-muted);
        }

        /* License cards */
        .license-card {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .license-card.expired {
            background: #fff1f2;
            border-color: #fecdd3;
        }

        .lic-app {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .lic-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .lic-badge {
            font-size: 0.62rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 100px;
        }

        .lic-badge.active {
            background: #dcfce7;
            color: #166534;
        }

        .lic-badge.expired {
            background: #fee2e2;
            color: #991b1b;
        }

        .lic-badge.type {
            background: var(--primary-light);
            color: var(--primary);
        }

        .lic-key {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.04);
            padding: 3px 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lic-key:hover {
            background: rgba(24, 101, 202, 0.1);
            color: var(--primary);
        }

        /* Quick Replies */
        .panel-footer {
            padding: 14px 20px 18px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .qr-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .qr-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .qr-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            background: var(--chat-bg);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: left;
            width: 100%;
            transition: all 0.15s;
        }

        .qr-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .qr-btn i {
            font-size: 0.72rem;
            width: 14px;
            color: var(--primary);
        }

        /* =================== MOBILE RESPONSIVE =================== */
        @media (max-width: 900px) {
            #mainInterface.visible {
                grid-template-columns: 240px 1fr;
                grid-template-rows: 100vh;
            }

            .right-panel {
                display: none;
            }
        }

        @media (max-width: 600px) {
            #mainInterface.visible {
                grid-template-columns: 1fr;
            }

            .left-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .left-sidebar.open {
                transform: translateX(0);
            }

            .mobile-toggle-btn {
                display: flex !important;
            }
        }

        .mobile-toggle-btn {
            display: none;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            margin-right: 8px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Typing indicator */
        .typing-bubble {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* Fade in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg {
            animation: fadeIn 0.2s ease;
        }
    </style>
</head>

<body>

    <!-- =================== LOGIN OVERLAY =================== -->
    <div id="loginOverlay">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://i.imgur.com/BZ1xLO3.png" alt="Primadev">
            </div>
            <div class="login-title">CS Command Center</div>
            <div class="login-sub">Masuk dengan akun staf yang terdaftar</div>
            <form onsubmit="handleLogin(event)">
                <input type="email" id="csEmail" class="login-input" placeholder="Email Agent" required>
                <input type="password" id="csPass" class="login-input" placeholder="Password" required>
                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- =================== MAIN INTERFACE =================== -->
    <div id="mainInterface">
        <div id="mobileSidebarOverlay" class="sidebar-overlay" onclick="closeMobileSidebar()"></div>

        <!-- LEFT SIDEBAR — Chat Queue -->
        <div class="left-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon"><i class="fa-solid fa-headset"></i></div>
                    <div class="brand-text">
                        <div class="brand-name">CS Panel</div>
                        <div class="brand-sub">Primadev Support</div>
                    </div>
                </div>
                <button class="logout-btn" onclick="handleLogout()" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>

            <div class="sidebar-section-label">Antrian Chat</div>

            <div id="chatList">
                <div class="empty-queue">
                    <i class="fa-regular fa-inbox"></i>
                    <p>Belum ada antrian masuk</p>
                </div>
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="main-chat">

            <!-- Chat Header -->
            <div id="chatHeader" class="chat-top-bar hidden">
                <div class="chat-user-info">
                    <button class="mobile-toggle-btn" onclick="toggleMobileSidebar()">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="chat-user-avatar" id="chatAvatarTop">?</div>
                    <div>
                        <div class="chat-user-name" id="currentUserName">—</div>
                        <div class="chat-user-status" id="currentUserStatus">ONLINE</div>
                    </div>
                </div>
                <button class="resolve-btn" onclick="resolveChat()">
                    <i class="fa-solid fa-check"></i> Selesaikan Sesi
                </button>
            </div>

            <!-- Messages -->
            <div id="messagesArea" class="messages-area">
                <div class="empty-chat">
                    <div class="empty-chat-icon"><i class="fa-regular fa-comments"></i></div>
                    <h3>Belum ada chat dipilih</h3>
                    <p>Pilih percakapan dari antrian di sebelah kiri</p>
                    <button class="btn btn-primary mt-3 d-md-none" onclick="toggleMobileSidebar()"
                        style="background: var(--primary); border:none; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 600; cursor: pointer;">
                        <i class="fa-solid fa-list-ul me-2"></i> Lihat Antrian
                    </button>
                </div>
            </div>

            <!-- Input -->
            <div id="inputArea" class="chat-input-bar hidden">
                <div class="input-row">
                    <textarea id="agentInput" rows="1" placeholder="Ketik balasan..."
                        onInput="autoResize(this)"></textarea>
                    <button class="send-btn" onclick="sendAgentMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL — Customer Info -->
        <div class="right-panel">
            <div class="panel-header">
                <h4><i class="fa-solid fa-circle-user" style="color:var(--primary); margin-right:6px;"></i>Info
                    Pelanggan</h4>
            </div>

            <div class="panel-body">
                <!-- Profile -->
                <div class="customer-profile">
                    <div class="profile-avatar"><span id="profileInitial">?</span></div>
                    <div class="profile-name" id="infoName">—</div>
                    <div class="profile-email" id="infoEmail">—</div>
                </div>

                <!-- Contact Info -->
                <div class="info-section">
                    <div class="info-section-label">Kontak</div>
                    <div class="info-row">
                        <i class="fa-regular fa-envelope"></i>
                        <span class="info-row-val muted" id="infoEmailRow">—</span>
                    </div>
                    <div class="info-row">
                        <i class="fa-solid fa-phone"></i>
                        <span class="info-row-val muted" id="infoPhone">—</span>
                    </div>
                </div>

                <!-- License History -->
                <div class="info-section" id="licenseHistoryArea"></div>
            </div>

            <!-- Quick Replies -->
            <div class="panel-footer">
                <div class="qr-label"><i class="fa-solid fa-bolt"
                        style="color:var(--primary); margin-right:4px;"></i>Balasan Cepat</div>
                <div class="qr-list">
                    <button class="qr-btn" onclick="quickReply('Halo, selamat siang! Ada yang bisa saya bantu? 😊')">
                        <i class="fa-regular fa-hand-wave"></i> Greeting Awal
                    </button>
                    <button class="qr-btn" onclick="quickReply('Mohon ditunggu sebentar, saya cek datanya ya.')">
                        <i class="fa-regular fa-clock"></i> Minta Tunggu
                    </button>
                    <button class="qr-btn"
                        onclick="quickReply('Terima kasih sudah menghubungi kami! Senang bisa membantu. 🙏')">
                        <i class="fa-regular fa-circle-check"></i> Closing
                    </button>
                    <button class="qr-btn"
                        onclick="quickReply('Silakan cek email Anda, license key sudah kami kirimkan.')">
                        <i class="fa-solid fa-key"></i> License Terkirim
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, update, onChildAdded, onChildChanged, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // --- GET CONFIG DYNAMICALLY ---
        let firebaseConfig;
        try {
            const configRes = await fetch('/.netlify/functions/get-config');
            if (!configRes.ok) throw new Error('Failed to load config');
            firebaseConfig = await configRes.json();
        } catch (err) {
            console.error("Firebase Config Error:", err);
            Swal.fire('Error', 'Gagal memuat konfigurasi sistem. Coba refresh halaman.', 'error');
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let activeChatId = null;
        let typingTimeout;
        const pageLoadTime = Date.now();

        // =================== AUTH ===================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainInterface').classList.add('visible');
                initChatList();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainInterface').classList.remove('visible');
            }
        });

        window.handleLogin = (e) => {
            e.preventDefault();
            const btn = e.submitter;
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Masuk...'; }
            signInWithEmailAndPassword(auth,
                document.getElementById('csEmail').value,
                document.getElementById('csPass').value
            ).catch(err => {
                Swal.fire('Login Gagal', err.message, 'error');
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard'; }
            });
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        // Track new chat for notification sound
        onChildAdded(ref(db, 'live_chats'), (snap) => {
            const info = snap.val().info || {};
            if (info.status === 'active' && info.last_active > pageLoadTime) {
                playSound('new');
            }
        });

        // =================== CHAT LIST ===================
        function initChatList() {
            onValue(ref(db, 'live_chats'), (snap) => {
                const list = document.getElementById('chatList');
                list.innerHTML = '';

                console.log('[CS-PANEL] live_chats snapshot exists:', snap.exists());
                if (snap.exists()) {
                    console.log('[CS-PANEL] live_chats data:', snap.val());
                }

                if (!snap.exists()) {
                    list.innerHTML = `<div class="empty-queue"><i class="fa-regular fa-inbox"></i><p>Belum ada antrian masuk</p></div>`;
                    return;
                }

                let count = 0;
                snap.forEach(c => {
                    const id = c.key;
                    const i = c.val().info || {};
                    if (i.status === 'closed') return;
                    count++;

                    const initial = (i.name || '?').charAt(0).toUpperCase();
                    const timeStr = new Date(i.last_active).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const unreadEl = i.unread ? `<div class="unread-dot"></div>` : '';

                    const item = document.createElement('div');
                    item.className = `chat-item ${activeChatId === id ? 'active' : ''}`;
                    item.id = `chat-item-${id}`;
                    item.onclick = () => openChat(id, i);
                    item.innerHTML = `
                        <div class="chat-item-row">
                            <div class="chat-avatar">${initial}</div>
                            <div class="chat-meta">
                                <div class="chat-name">${i.name || 'Unknown'}</div>
                                <div class="chat-preview">${i.email || id}</div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                                <span class="chat-time">${timeStr}</span>
                                ${unreadEl}
                            </div>
                        </div>`;
                    list.appendChild(item);
                });

                if (count === 0) {
                    list.innerHTML = `<div class="empty-queue"><i class="fa-regular fa-inbox"></i><p>Belum ada antrian aktif</p></div>`;
                }
            }, (error) => {
                console.error('[CS-PANEL] Error membaca live_chats:', error);
            });
        }

        // =================== OPEN CHAT ===================
        function openChat(chatId, info) {
            activeChatId = chatId;

            // Close mobile sidebar if open
            closeMobileSidebar();

            // Update active state in sidebar
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            const el = document.getElementById(`chat-item-${chatId}`);
            if (el) el.classList.add('active');

            // Fill right panel
            const initial = (info.name || '?').charAt(0).toUpperCase();
            document.getElementById('profileInitial').textContent = initial;
            document.getElementById('chatAvatarTop').textContent = initial;
            document.getElementById('infoName').textContent = info.name || '—';
            document.getElementById('infoEmail').textContent = info.email || '—';
            document.getElementById('infoEmailRow').textContent = info.email || '—';
            document.getElementById('infoPhone').textContent = info.phone || '—';
            document.getElementById('currentUserName').textContent = (info.name || 'USER').toUpperCase();

            // Show chat UI
            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('inputArea').classList.remove('hidden');

            // Check license
            checkLicenseHistory(info.email);

            // Mark as read
            update(ref(db, `live_chats/${chatId}/info`), { unread: 0 });

            // Clear messages
            const msgArea = document.getElementById('messagesArea');
            msgArea.innerHTML = '';

            // Listen messages
            const mRef = ref(db, `live_chats/${chatId}/messages`);
            onChildAdded(mRef, (s) => {
                const m = s.val();
                renderMessage(s.key, m);
                if (m.sender === 'user' && !m.read) {
                    update(ref(db, `live_chats/${chatId}/messages/${s.key}`), { read: true });
                }
            });

            onChildChanged(mRef, (s) => {
                if (s.val().read) {
                    const t = document.getElementById(`tick-${s.key}`);
                    if (t) {
                        t.innerHTML = '<i class="fa-solid fa-check-double"></i>';
                        t.className = 'tick-read';
                    }
                }
            });

            // Typing indicator
            onValue(ref(db, `live_chats/${chatId}/typing/user`), (s) => {
                const st = document.getElementById('currentUserStatus');
                if (s.val()) {
                    st.innerHTML = '<span style="color:var(--primary); font-weight:600; font-size:0.7rem;">Sedang mengetik...</span>';
                } else {
                    st.textContent = 'ONLINE';
                    st.style.color = '';
                }
            });

            // Clone input to reset old listeners
            const agentInput = document.getElementById('agentInput');
            const newInput = agentInput.cloneNode(true);
            agentInput.parentNode.replaceChild(newInput, agentInput);
            newInput.value = '';

            newInput.addEventListener('input', () => {
                set(ref(db, `live_chats/${chatId}/typing/agent`), true);
                autoResize(newInput);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    set(ref(db, `live_chats/${chatId}/typing/agent`), false);
                }, 2000);
            });

            newInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendAgentMessage();
                }
            });

            // Listen if customer closes chat
            onValue(ref(db, `live_chats/${chatId}/info/status`), (snap) => {
                if (snap.val() === 'closed' && activeChatId === chatId) {
                    Swal.fire({
                        title: 'Chat Diakhiri',
                        text: 'Customer telah mengakhiri sesi percakapan ini.',
                        icon: 'info',
                        timer: 3000,
                        showConfirmButton: false,
                        toast: true,
                        position: 'top-end'
                    });
                    setTimeout(() => {
                        if (activeChatId === chatId) resetChatUI();
                    }, 3000);
                }
            });
        }

        // =================== LICENSE CHECKER ===================
        async function checkLicenseHistory(rawEmail) {
            const area = document.getElementById('licenseHistoryArea');
            if (!rawEmail) { area.innerHTML = ''; return; }
            const email = rawEmail.toLowerCase().trim();

            area.innerHTML = `<div class="info-section-label">Lisensi</div><div style="text-align:center; padding:10px; font-size:0.75rem; color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i>Memeriksa database...</div>`;

            try {
                // Coba query dengan field 'email' (field yang benar di licenses)
                const snap = await get(query(ref(db, 'licenses'), orderByChild('email'), equalTo(email)));
                if (snap.exists()) {
                    let html = `<div class="info-section-label">Lisensi Ditemukan</div>`;
                    snap.forEach(c => {
                        const l = c.val();
                        const isActive = l.status === 'active';
                        const cardCls = isActive ? '' : 'expired';
                        const badgeCls = isActive ? 'active' : 'expired';
                        const badgeTxt = isActive ? 'AKTIF' : 'NON-AKTIF';
                        html += `
                        <div class="license-card ${cardCls}">
                            <div class="lic-app">${l.appName || 'Unknown App'}</div>
                            <div class="lic-meta">
                                <span class="lic-badge type">${(l.type || 'standard').toUpperCase()}</span>
                                <span class="lic-badge ${badgeCls}">${badgeTxt}</span>
                            </div>
                            ${l.expiryDate ? `<div style="font-size:0.68rem; color:var(--text-muted); margin-bottom:5px;"><i class="fa-regular fa-calendar" style="margin-right:3px;"></i>${l.expiryDate}</div>` : ''}
                            <span class="lic-key" onclick="navigator.clipboard.writeText('${l.key}').then(()=>showToast('Key disalin!'))" title="Klik untuk salin">${l.key}</span>
                        </div>`;
                    });
                    area.innerHTML = html;
                } else {
                    area.innerHTML = `
                        <div class="info-section-label">Lisensi</div>
                        <div style="text-align:center; padding:14px 0; font-size:0.78rem; color:var(--text-muted);">
                            <i class="fa-solid fa-circle-xmark" style="display:block; font-size:1.3rem; margin-bottom:6px; color:#e5e7eb;"></i>
                            Belum ada lisensi terdaftar
                        </div>`;
                }
            } catch (e) {
                area.innerHTML = `<div class="info-section-label">Lisensi</div><div style="font-size:0.75rem; color:var(--danger); padding:8px;">Error: ${e.message}</div>`;
            }
        }

        // =================== SEND MESSAGE ===================
        window.sendAgentMessage = async () => {
            if (!activeChatId) return;
            const input = document.getElementById('agentInput');
            const text = input.value.trim();
            if (!text) return;

            await push(ref(db, `live_chats/${activeChatId}/messages`), {
                sender: 'agent', name: 'CS Admin', text: text, timestamp: Date.now(), read: false
            });
            update(ref(db, `live_chats/${activeChatId}/info`), { unread: 1 });

            input.value = '';
            input.style.height = '';
            set(ref(db, `live_chats/${activeChatId}/typing/agent`), false);

            setTimeout(() => {
                const area = document.getElementById('messagesArea');
                area.scrollTop = area.scrollHeight;
            }, 100);
        };

        // =================== RENDER MESSAGE ===================
        function renderMessage(key, msg) {
            const area = document.getElementById('messagesArea');

            // Remove empty state
            const emptyEl = area.querySelector('.empty-chat');
            if (emptyEl) emptyEl.remove();

            const div = document.createElement('div');
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (msg.sender === 'user') {
                div.className = 'msg msg-user';
                div.innerHTML = `
                    <div class="msg-bubble">${escHtml(msg.text)}</div>
                    <div class="msg-footer"><span>${time}</span></div>`;
                if (msg.timestamp > pageLoadTime) playSound('msg');

            } else if (msg.sender === 'agent') {
                const tickHtml = msg.read
                    ? `<span id="tick-${key}" class="tick-read"><i class="fa-solid fa-check-double"></i></span>`
                    : `<span id="tick-${key}" class="tick-pending"><i class="fa-solid fa-check"></i></span>`;
                div.className = 'msg msg-agent';
                div.innerHTML = `
                    <div class="msg-bubble">${escHtml(msg.text)}</div>
                    <div class="msg-footer"><span>${time}</span>${tickHtml}</div>`;

            } else {
                div.className = 'msg-system';
                div.textContent = msg.text;
            }

            area.appendChild(div);
            setTimeout(() => area.scrollTop = area.scrollHeight, 80);
        }

        // =================== RESOLVE CHAT ===================
        window.resolveChat = () => {
            if (!activeChatId) return;
            Swal.fire({
                title: 'Selesaikan Sesi?',
                text: 'Chat akan ditutup dan diarsipkan.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#16a34a',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Ya, Selesaikan',
                cancelButtonText: 'Batal',
                customClass: { popup: 'rounded-4' }
            }).then(r => {
                if (r.isConfirmed) {
                    update(ref(db, `live_chats/${activeChatId}/info`), { status: 'closed' }).then(() => {
                        showToast('Sesi chat berhasil diselesaikan');
                        setTimeout(() => resetChatUI(), 400);
                    });
                }
            });
        };

        function resetChatUI() {
            activeChatId = null;
            document.getElementById('messagesArea').innerHTML = `
                <div class="empty-chat">
                    <div class="empty-chat-icon"><i class="fa-regular fa-comments"></i></div>
                    <h3>Belum ada chat dipilih</h3>
                    <p>Pilih percakapan dari antrian di sebelah kiri</p>
                </div>`;
            document.getElementById('chatHeader').classList.add('hidden');
            document.getElementById('inputArea').classList.add('hidden');
            document.getElementById('infoName').textContent = '—';
            document.getElementById('infoEmail').textContent = '—';
            document.getElementById('infoEmailRow').textContent = '—';
            document.getElementById('infoPhone').textContent = '—';
            document.getElementById('profileInitial').textContent = '?';
            document.getElementById('licenseHistoryArea').innerHTML = '';
        }

        // =================== QUICK REPLY ===================
        window.quickReply = (t) => {
            const input = document.getElementById('agentInput');
            input.value = t;
            sendAgentMessage();
        };

        // =================== UTILITIES ===================
        function playSound(type = 'msg') {
            const url = type === 'new'
                ? "https://cdn.freesound.org/previews/171/171697_2437358-lq.mp3"
                : "https://cdn.freesound.org/previews/536/536108_11566838-lq.mp3";
            new Audio(url).play().catch(() => { });
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function showToast(title) {
            Swal.mixin({
                toast: true, position: 'top-end',
                showConfirmButton: false, timer: 2500, timerProgressBar: true
            }).fire({ icon: 'success', title });
        }

        window.showToast = showToast;

        window.toggleMobileSidebar = () => {
            document.querySelector('.left-sidebar').classList.toggle('open');
            document.getElementById('mobileSidebarOverlay').classList.toggle('active');
        };

        window.closeMobileSidebar = () => {
            const sidebar = document.querySelector('.left-sidebar');
            const overlay = document.getElementById('mobileSidebarOverlay');
            if (sidebar) sidebar.classList.remove('open');
            if (overlay) overlay.classList.remove('active');
        };
    </script>

    <script>
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }
    </script>

</body>

</html>
